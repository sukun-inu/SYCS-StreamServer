version: "3.8"

# ============================================================
#  SYCS Stream Server — docker-compose.yml
#  すべての設定値は .env (または Portainer の Environment 欄) で上書き可能
# ============================================================

services:

  # ── RTMP 受信 + FFmpeg NVENC エンコード + LL-HLS 生成 ──────────────────────
  media-server:
    build:
      context: ./media-server
      args:
        CUDA_VERSION: ${CUDA_VERSION:-12.3.1-runtime-ubuntu22.04}
    image: sycs-media-server:latest
    container_name: ${MEDIA_CONTAINER:-sycs-media-server}
    ports:
      - "${RTMP_PORT:-1935}:1935"
    volumes:
      - hls-data:/hls
    environment:
      - VIDEO_BITRATE=${VIDEO_BITRATE:-4000k}
      - AUDIO_BITRATE=${AUDIO_BITRATE:-128k}
      - HLS_SEGMENT_TIME=${HLS_SEGMENT_TIME:-0.5}
      - HLS_PART_DURATION=${HLS_PART_DURATION:-0.1}
      - HLS_LIST_SIZE=${HLS_LIST_SIZE:-6}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "1935"]
      interval: ${HC_INTERVAL:-10s}
      timeout: ${HC_TIMEOUT:-5s}
      retries: ${HC_RETRIES:-5}
      start_period: 10s

  # ── HLS HTTP 配信 + ポータルサイト ──────────────────────────────────────────
  api-server:
    build: ./api-server
    image: sycs-api-server:latest
    container_name: ${API_CONTAINER:-sycs-api-server}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - hls-data:/hls:ro
    environment:
      - HLS_DIR=/hls
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NGROK_HLS_API=${NGROK_HLS_API:-http://ngrok-hls:4040}
      - NGROK_RTMP_API=${NGROK_RTMP_API:-http://ngrok-rtmp:4040}
      - NGROK_CACHE_TTL=${NGROK_CACHE_TTL:-30}
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      media-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: ${HC_INTERVAL:-10s}
      timeout: ${HC_TIMEOUT:-5s}
      retries: ${HC_RETRIES:-3}
      start_period: 5s

  # ── ngrok: HLS / ポータル公開 (HTTPS) ──────────────────────────────────────
  ngrok-hls:
    image: ngrok/ngrok:latest
    container_name: ${NGROK_HLS_CONTAINER:-sycs-ngrok-hls}
    # NGROK_HLS_TARGET を env で変更可 (例: 別ホストに向ける場合)
    command: http --log=stdout ${NGROK_HLS_TARGET:-sycs-api-server:8080}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "${NGROK_HLS_UI_PORT:-4040}:4040"
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      api-server:
        condition: service_healthy

  # ── ngrok: RTMP ingest 公開 (TCP) ─────────────────────────────────────────
  # LAN 内から OBS 配信する場合はこのサービスは不要 (コメントアウト可)
  ngrok-rtmp:
    image: ngrok/ngrok:latest
    container_name: ${NGROK_RTMP_CONTAINER:-sycs-ngrok-rtmp}
    command: tcp --log=stdout ${NGROK_RTMP_TARGET:-sycs-media-server:1935}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    ports:
      - "${NGROK_RTMP_UI_PORT:-4041}:4040"
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      media-server:
        condition: service_healthy

volumes:
  hls-data:
    driver: local
