load_module /usr/lib/nginx/modules/ngx_rtmp_module.so;

# ストリームごとに FFmpeg (exec_push) を 1 つだけ起動するため単一ワーカー。
# worker_processes auto; + rtmp_auto_push on; の組み合わせはコア数分 exec_push が
# 発火して FFmpeg が競合するため使用しない。
worker_processes 1;

# ワーカーを www-data で動かし exec_push も www-data として実行する。
# これにより /hls (entrypoint.sh で www-data:www-data に chown) への書き込みが可能になる。
user www-data;

events {
    worker_connections 1024;
}

rtmp {
    server {
        listen 1935;
        chunk_size 4096;
        max_message 1M;

        application live {
            live on;
            record off;

            allow publish all;
            allow play all;

            exec_push /usr/local/bin/publish.sh $name;
            exec_kill_signal term;
        }
    }
}
