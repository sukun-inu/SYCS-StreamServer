version: "3.8"

# ============================================================
#  SYCS Stream Server — docker-compose.yml
#  すべての設定値は .env (または Portainer の Environment 欄) で上書き可能
#  ネットワークモード: host (全コンテナがホスト NW を共有)
#
#  Portainer 運用: image: ghcr.io/... を pull して起動
#  ローカル開発:   docker compose build --no-cache && docker compose up -d
# ============================================================

services:

  # ── RTMP 受信 + FFmpeg NVENC エンコード + HLS 生成 ─────────────────────────
  media-server:
    image: ghcr.io/sukun-inu/sycs-media-server:latest
    container_name: ${MEDIA_CONTAINER:-sycs-media-server}
    network_mode: host
    volumes:
      - hls-data:/hls
    environment:
      - VIDEO_BITRATE_LOW=${VIDEO_BITRATE_LOW:-2000k}
      - AUDIO_BITRATE=${AUDIO_BITRATE:-128k}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: ${GPU_COUNT:-1}
              capabilities: [gpu]
    restart: ${RESTART_POLICY:-unless-stopped}
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "1935"]
      interval: ${HC_INTERVAL:-10s}
      timeout: ${HC_TIMEOUT:-5s}
      retries: ${HC_RETRIES:-5}
      start_period: 30s

  # ── HLS HTTP 配信 + ポータルサイト ──────────────────────────────────────────
  # SITE_BASE_URL に Cloudflare の公開ドメインを設定するとポータルの URL 表示に反映される
  api-server:
    image: ghcr.io/sukun-inu/sycs-api-server:latest
    container_name: ${API_CONTAINER:-sycs-api-server}
    network_mode: host
    volumes:
      - hls-data:/hls:ro
    environment:
      - HLS_DIR=/hls
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - NGROK_RTMP_API=${NGROK_RTMP_API:-http://127.0.0.1:4040}
      - NGROK_CACHE_TTL=${NGROK_CACHE_TTL:-30}
      - SITE_BASE_URL=${SITE_BASE_URL:-}
      - MAX_SESSIONS=${MAX_SESSIONS:-100}
      - SESSION_TIMEOUT=${SESSION_TIMEOUT:-15.0}
      - QUEUE_TIMEOUT=${QUEUE_TIMEOUT:-20.0}
      - MAX_BPS=${MAX_BPS:-3000000}
      - SEGMENT_SECRET=${SEGMENT_SECRET:-}
      - SEGMENT_TTL=${SEGMENT_TTL:-120}
      - TOKEN_TTL=${TOKEN_TTL:-60}
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      media-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: ${HC_INTERVAL:-10s}
      timeout: ${HC_TIMEOUT:-5s}
      retries: ${HC_RETRIES:-3}
      start_period: 5s

  # ── ngrok: RTMP ingest 公開 (TCP) ─────────────────────────────────────────
  # LAN 内から OBS 配信する場合はこのサービスは不要 (コメントアウト可)
  # 管理 UI: http://localhost:4040
  ngrok-rtmp:
    image: ngrok/ngrok:latest
    container_name: ${NGROK_RTMP_CONTAINER:-sycs-ngrok-rtmp}
    network_mode: host
    command: tcp --log=stdout ${NGROK_RTMP_TARGET:-127.0.0.1:1935}
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    restart: ${RESTART_POLICY:-unless-stopped}
    depends_on:
      media-server:
        condition: service_healthy

volumes:
  hls-data:
    driver: local
