logLevel: info
logDestinations: [stdout]

# RTMP ingest (OBS → port 1935)
rtmpAddress: :1935

# 不要なプロトコルを無効化
hls: no
webrtc: no
srt: no

paths:
  # OBS が rtmp://host:1935/live でアプリ名 "live"、ストリームキー任意の場合
  # mediamtx が作成するパスは "live/..." になる。
  # runOnReady は環境変数 MTX_PATH="live/..." を渡すため引数なしで OK。
  # (旧称 runOnPublish は現行バージョンで runOnReady に改名された)
  all_others:
    runOnReady: /usr/local/bin/publish.sh
    runOnReadyRestart: yes
