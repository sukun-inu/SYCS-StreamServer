logLevel: info
logDestinations: [stdout]

api: yes
apiAddress: :9997

rtmpAddress: :1935
rtspAddress: :8554

# ── mediamtx ネイティブ LL-HLS ───────────────────────────────────────────────
# FFmpeg ではなく mediamtx が EXT-X-PART 付き LL-HLS を生成する。
# LL-HLS のプレイリストは MediaMTX の HLS HTTP から読む。
hls: yes
hlsAddress: :8888
hlsAlwaysRemux: yes        # api-server が読みに来る前からHLS muxerを動かす
hlsVariant: lowLatency     # EXT-X-PART / EXT-X-SERVER-CONTROL 付き
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 100ms
hlsDirectory: /hls         # セグメントと non-low-latency playlist の保存先

webrtc: no
srt: no

paths:
  all_others:
    runOnReady: /usr/local/bin/publish.sh
    runOnReadyRestart: no  # 再起動は publish.sh 内で制御し、_transcode の再帰再起動を避ける
